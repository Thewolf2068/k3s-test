apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crowdsec
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://crowdsecurity.github.io/helm-charts
    chart: crowdsec
    targetRevision: "0.9.x"
    helm:
      values: |
        container_runtime: containerd
        agent:
          acquisition:
            - namespace: traefik
              podName: traefik-*
              program: traefik
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/traefik"
        lapi:
          dashboard:
            enabled: false
          env:
            - name: BOUNCER_KEY_TRAEFIK  # Registers a bouncer named 'traefik'
              valueFrom:
                secretKeyRef:
                  name: crowdsec-bouncer-key
                  key: key  # Matches the key name in your SealedSecret
  destination:
    server: https://kubernetes.default.svc
    namespace: crowdsec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
