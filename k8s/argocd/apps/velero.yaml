apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "7.1.3"
    helm:
      values: |
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: k3s-backup
              config:
                region: auto
                s3ForcePathStyle: true
                s3Url: https://ba7af738ac3fcf781135c6b598a7f096.r2.cloudflarestorage.com
          
          # THE FIX: Explicitly set this to an empty list.
          # This stops the chart from creating an invalid "default" VSL.
          volumeSnapshotLocation: []

          plugins:
            - velero/velero-plugin-for-aws:v1.9.0

        # Disabling the problematic upgrade job entirely
        upgradeCRDs: false

        # Overriding the broken auto-detected image
        kubectl:
          image:
            repository: bitnamilegacy/kubectl
            tag: "1.33"

        # Engine for local-path / hostPath backups
        deployNodeAgent: true

        credentials:
          useSecret: true
          existingSecret: velero-s3-credentials

        schedules:
          daily-backup:
            schedule: "0 3 * * *"
            template:
              ttl: "720h"

  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
