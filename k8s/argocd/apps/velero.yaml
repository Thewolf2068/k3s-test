apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "7.1.3"
    helm:
      values: |
        configuration:
          backupStorageLocation:
            name: default
            provider: aws
            bucket: k3s-backup
            config:
              region: auto
              s3ForcePathStyle: true
              s3Url: https://ba7af738ac3fcf781135c6b598a7f096.r2.cloudflarestorage.com
          
          plugins:
            - velero/velero-plugin-for-aws:v1.9.0

        deployNodeAgent: true

        credentials:
          useSecret: true
          existingSecret: velero-s3-credentials

        schedules:
          daily-backup:
            schedule: "0 3 * * *"
            template:
              ttl: "720h"

  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
