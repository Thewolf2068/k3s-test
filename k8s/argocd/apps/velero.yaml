apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "8.3.0"
    helm:
      values: |
        configuration:
          defaultVolumesToFsBackup: true
          backupStorageLocation:
            - name: default
              provider: velero.io/aws
              bucket: k3s-backups
              config:
                region: auto
                s3ForcePathStyle: true
                s3Url: https://ba7af738ac3fcf781135c6b598a7f096.r2.cloudflarestorage.com
          volumeSnapshotLocation: []
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.11.1
            volumeMounts:
              - mountPath: /target
                name: plugins

        # THIS is the key that actually creates the DaemonSet
        deployNodeAgent: true

        nodeAgent:
          podVolumePath: /var/lib/rancher/k3s/agent/kubelet
          containerSecurityContext:
            privileged: true

        credentials:
          useSecret: true
          existingSecret: velero-s3-credentials
        upgradeCRDs: false
        kubectl:
          image:
            repository: bitnami/kubectl
            tag: latest
        schedules:
          velero-daily-backup:
            schedule: "0 3 * * *"
            template:
              ttl: "720h"
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
