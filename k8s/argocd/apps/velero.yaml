apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "7.1.3"
    helm:
      values: |
        configuration:
          backupStorageLocation:
            - name: default
              provider: aws
              bucket: k3s-backup
              config:
                region: auto
                s3ForcePathStyle: true
                s3Url: https://ba7af738ac3fcf781135c6b598a7f096.r2.cloudflarestorage.com
          volumeSnapshotLocation: []

        # THE FIX: Plugins must be injected as initContainers in this chart version
        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.9.0
            volumeMounts:
              - mountPath: /plugins
                name: plugins

        upgradeCRDs: false

        kubectl:
          image:
            repository: bitnamilegacy/kubectl
            tag: "1.33"

        deployNodeAgent: true

        credentials:
          useSecret: true
          existingSecret: velero-s3-credentials

        schedules:
          velero-daily-backup: # Matches the name you used in the CLI
            schedule: "0 3 * * *"
            template:
              ttl: "720h"

  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
