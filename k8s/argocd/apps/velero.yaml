apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://vmware-tanzu.github.io/helm-charts
    chart: velero
    targetRevision: "8.3.0"
    helm:
      values: |
        configuration:
          # THE "JUST WORK" SETTING: Backs up all volume data by default
          defaultVolumesToFsBackup: true 
          backupStorageLocation:
            - name: default
              provider: velero.io/aws 
              bucket: k3s-backups
              config:
                region: auto
                s3ForcePathStyle: true
                s3Url: https://ba7af738ac3fcf781135c6b598a7f096.r2.cloudflarestorage.com
          volumeSnapshotLocation: []

        plugins:
          - velero/velero-plugin-for-aws:v1.13.0

        nodeAgent:
          enabled: true
          # FIX 1: Explicitly add the 'role' label so Velero can find the agent
          podLabels:
            role: node-agent
          containerSecurityContext:
            privileged: true
          # FIX 2: Allow the agent to run on your K3s control-plane node
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Exists
              effect: NoSchedule

        upgradeCRDs: false
        credentials:
          useSecret: true
          existingSecret: velero-s3-credentials
        schedules:
          velero-daily-backup:
            schedule: "0 3 * * *"
            template:
              ttl: "720h"
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
