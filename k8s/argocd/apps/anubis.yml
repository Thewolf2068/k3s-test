apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: anubis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thewolf2068/k3s-test
    targetRevision: HEAD
    path: charts/my-services
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: anubis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
