- name: Enable Universe repository and install Python dependencies
  ansible.builtin.apt:
    name: 
      - python3-kubernetes
      - python3-yaml
    state: present
    update_cache: yes
  become: true

- name: Download and install Helm binary
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0700'
  become: true

- name: Run Helm install script
  ansible.builtin.command: /tmp/get_helm.sh
  become: true
  args:
    creates: /usr/local/bin/helm

- name: Create ArgoCD namespace natively
  kubernetes.core.k8s:
    name: argocd
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: true

- name: Add ArgoCD Helm repository
  kubernetes.core.helm_repository:
    name: argo
    repo_url: "https://argoproj.github.io/argo-helm"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: true

- name: Deploy ArgoCD via Helm
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    values:
      configs:
        params:
          server.insecure: true
      server:
        ingress:
          enabled: false
  become: true


- name: Create kube-system namespace if it doesn't exist
  kubernetes.core.k8s:
    name: kube-system
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: true

- name: Deploy Vaulted Sealed Secrets Master Key
  kubernetes.core.k8s:
    state: present
    # Ansible Vault automatically decrypts this during the run 
    # if you provide the --ask-vault-pass flag
    definition: "{{ lookup('file', 'sealed-secrets-master.key.yaml') | from_yaml }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: true


- name: Download App of Apps manifest from remote Git repository
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/Thewolf2068/k3s-test/main/k8s/argocd/apps/apps.yaml"
    dest: /tmp/apps.yaml
    mode: '0644'
  become: true

- name: Read the downloaded manifest
  ansible.builtin.slurp:
    src: /tmp/apps.yaml
  register: apps_manifest_encoded
  become: true

- name: Disable automated sync in the manifest
  ansible.builtin.set_fact:
    apps_manifest_no_sync: >-
      {{ 
        apps_manifest_encoded.content | b64decode | from_yaml 
        | combine({'spec': {'syncPolicy': {'automated': None}}}, recursive=True) 
      }}

- name: Write the modified manifest back to /tmp/apps.yaml
  ansible.builtin.copy:
    content: "{{ apps_manifest_no_sync | to_nice_yaml }}"
    dest: /tmp/apps.yaml
    mode: '0644'
  become: true

- name: Initialize App of Apps (Remote Bootstrap)
  kubernetes.core.k8s:
    state: present
    src: /tmp/apps.yaml
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  become: true


- name: Deploy ArgoCD via Helm
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    values:
      configs:
        params:
          server.insecure: true
      server:
        ingress:
          enabled: false
  become: true

