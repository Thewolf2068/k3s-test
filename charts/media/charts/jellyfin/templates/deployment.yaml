apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
      annotations:
        pre.hook.backup.velero.io/container: jellyfin
        pre.hook.backup.velero.io/command: '["/bin/sh", "-c", "kill -STOP $(pidof jellyfin || echo 1)"]'
        post.hook.backup.velero.io/container: jellyfin
        post.hook.backup.velero.io/command: '["/bin/sh", "-c", "kill -CONT $(pidof jellyfin || echo 1)"]'
    spec:
      securityContext:
        runAsUser: {{ .Values.global.securityContext.runAsUser }}
        runAsGroup: {{ .Values.global.securityContext.runAsGroup }}
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:{{ .Values.imageTag }}
          ports:
            - containerPort: {{ .Values.port }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: {{ printf "https://%s.%s" (.Values.subdomain | default "jellyfin") .Values.global.domain | quote }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config-pvc
        - name: media
          hostPath:
            path: /media
