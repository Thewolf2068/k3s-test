{{- range $name, $service := .Values.services }}
{{- if and $service.enabled (dig "anubis" "enabled" false $service) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anubis-{{ $name }}
  namespace: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anubis-{{ $name }}
  template:
    metadata:
      labels:
        app: anubis-{{ $name }}
    spec:
      containers:
        - name: anubis
          image: ghcr.io/techarohq/anubis:latest
          env:
            - name: BIND
              value: "0.0.0.0:8923"
            - name: TARGET
              value: "http://{{ $name }}.{{ $name }}.svc.cluster.local:{{ $service.port }}"
            - name: DIFFICULTY
              value: {{ $service.anubis.difficulty | default 4 | quote }}
          ports:
            - containerPort: 8923
---
apiVersion: v1
kind: Service
metadata:
  name: anubis-{{ $name }}
  namespace: {{ $name }}
spec:
  type: ClusterIP
  selector:
    app: anubis-{{ $name }}
  ports:
    - port: 8923
      targetPort: 8923
{{- end }}
{{- end }}
