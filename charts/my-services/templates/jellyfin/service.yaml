apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  type: ClusterIP
  selector:
    app: jellyfin
  ports:
    - port: {{ .Values.services.jellyfin.port }}
      targetPort: {{ .Values.services.jellyfin.port }}
      nodePort: {{ .Values.services.jellyfin.nodePort }}
